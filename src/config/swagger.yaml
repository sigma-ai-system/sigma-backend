openapi: 3.0.0
info:
  title: API Dokumentasi Progres Skripsi
  version: 1.0.0
  description: Dokumentasi API lengkap untuk sistem autentikasi dan manajemen progres skripsi mahasiswa.
servers:
  - url: http://localhost:3000
    description: Server Lokal (Development)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Masukkan token JWT kamu dengan format: Bearer <token>
  schemas:
    Skripsi:
      type: object
      required:
        - progres_skripsi
      properties:
        id:
          type: string
          description: ID otomatis dari MongoDB
        user:
          type: string
          description: ID User pemilik data skripsi
        progres_skripsi:
          type: number
          example: 0
        frekuensi_bimbingan_bulanan:
          type: number
          example: 0
        keterlambatan_milestone_hari:
          type: number
          example: 0
        streak_aktivitas_mingguan:
          type: number
          example: 0
        jumlah_revisi_aktif:
          type: number
          example: 0

paths:
  /api/auth/login:
    post:
      summary: Login pengguna untuk mendapatkan token JWT
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: maba@example.com
                password:
                  type: string
                  example: rahasia123
      responses:
        200:
          description: Login Berhasil
        401:
          description: Kredensial tidak valid

  /api/skripsi:
    get:
      summary: Mengambil semua data skripsi milik user yang sedang login
      tags:
        - Skripsi
      security:
        - bearerAuth: []
      responses:
        200:
          description: Berhasil mengambil data
        401:
          description: Tidak ada token atau token tidak valid
    post:
      summary: Membuat data progres skripsi baru
      tags:
        - Skripsi
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Skripsi'
      responses:
        201:
          description: Data skripsi berhasil dibuat

  /api/skripsi/{id}:
    get:
      summary: Mengambil data skripsi berdasarkan ID
      tags:
        - Skripsi
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID Data Skripsi
      responses:
        200:
          description: Data ditemukan
        404:
          description: Data tidak ditemukan
    put:
      summary: Memperbarui seluruh field data skripsi (PUT)
      tags:
        - Skripsi
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Skripsi'
      responses:
        200:
          description: Data berhasil diperbarui secara penuh
    patch:
      summary: Memperbarui sebagian field data skripsi (PATCH)
      tags:
        - Skripsi
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                progres_skripsi:
                  type: number
      responses:
                200:
                  description: Data berhasil diperbarui sebagian
    delete:
      summary: Menghapus data skripsi
      tags:
        - Skripsi
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Data berhasil dihapus